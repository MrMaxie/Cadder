name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Optional version override for package-only dry runs.
        required: false
        default: ''

permissions:
  contents: read

jobs:
  release-gate:
    name: Validate release intent
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Validate version
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          manifest_version="$(python -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            version="${INPUT_VERSION:-$manifest_version}"
            publish="false"
          else
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "$tag_version" != "$manifest_version" ]]; then
              echo "::error::Tag $GITHUB_REF_NAME does not match workspace package version $manifest_version."
              exit 1
            fi
            version="$manifest_version"
            publish="true"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release versions must use semantic versions like 1.0.0 or 1.0.0-rc.1."
            exit 1
          fi

          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'publish=%s\n' "$publish" >> "$GITHUB_OUTPUT"

  docker-e2e:
    name: Docker E2E preflight
    needs: release-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Cache Cargo registry and target
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-${{ runner.os }}-release-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-release-e2e-
            cargo-${{ runner.os }}-

      - name: Check Docker
        run: docker version

      - name: Build Cadder binaries
        run: cargo build -p cadderd -p cadder-shim

      - name: Run Testcontainers end-to-end suite
        run: cargo test -p cadder-daemon --features docker-e2e --test testcontainers_e2e -- --ignored --test-threads=1

  package:
    name: Package ${{ matrix.platform }}
    needs:
      - release-gate
      - docker-e2e
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            platform: linux-x64
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            platform: macos-x64
            target: x86_64-apple-darwin
          - os: macos-15
            platform: macos-arm64
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Cache Cargo registry and target
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ matrix.target }}-
            cargo-${{ runner.os }}-

      - name: Package portable archive
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.release-gate.outputs.version }}
        run: |
          cargo run -p xtask -- package \
            --out artifacts \
            --version "$RELEASE_VERSION" \
            --platform "${{ matrix.platform }}" \
            --target "${{ matrix.target }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: cadder-${{ matrix.platform }}
          path: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/*.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - release-gate
      - package
    if: needs.release-gate.outputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "Portable Cadder release $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
