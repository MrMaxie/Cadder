name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check formatting
        run: cargo fmt --check

      - name: Check lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  project-check:
    name: Project validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2.9.1

      - name: Run project check
        run: cargo run -p xtask -- check

  coverage:
    name: Coverage (Windows MSVC)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install Rust toolchain
        run: rustup toolchain install stable-x86_64-pc-windows-msvc --profile minimal --component llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo +stable-x86_64-pc-windows-msvc install cargo-llvm-cov --version 0.8.7 --locked

      - name: Run coverage gate
        run: cargo +stable-x86_64-pc-windows-msvc run -p xtask -- coverage

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-summary-windows-msvc
          path: target/llvm-cov/coverage-summary.json
          if-no-files-found: ignore
          retention-days: 14

  docker-e2e:
    name: Docker E2E (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check Docker
        run: docker version

      - name: Build Cadder binaries
        run: cargo build -p cadderd -p cadder-shim

      - name: Run Testcontainers end-to-end suite
        run: cargo test -p cadder-daemon --features docker-e2e --test testcontainers_e2e -- --ignored --test-threads=1
